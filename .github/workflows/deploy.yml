name: Scrape & Deploy

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Run scraper
        id: scrape
        continue-on-error: true
        run: uv run python -m scraper.run

      - name: Check scraper output
        id: check
        run: |
          if [ -f "web/data/cards.json" ] && [ -s "web/data/cards.json" ]; then
            echo "fresh=true" >> "$GITHUB_OUTPUT"
            echo "Scraper produced fresh data"
          else
            echo "fresh=false" >> "$GITHUB_OUTPUT"
            echo "Scraper failed or empty, will use committed fallback data"
          fi

      - name: Commit updated data & cache
        if: steps.check.outputs.fresh == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/data/ translation_cache.json
          git diff --cached --quiet || git commit -m "chore: update scraped data & translation cache [skip ci]"
          git push || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
