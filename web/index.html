    .title-holo{color:var(--accent-cyan)}.title-card{color:var(--text-primary)}
    .title-meta{display:inline-block;background:var(--accent-cyan);color:var(--bg-primary);padding:0 .4em;margin-left:.3em;border-radius:4px;font-size:.75em}
    .site-subtitle{color:var(--text-secondary);margin-top:.4rem;font-size:.9rem}
    .lang-switcher{display:flex;justify-content:center;gap:.4rem;margin-top:.7rem}
    .lang-btn{background:rgba(255,255,255,.08);color:var(--text-secondary);border:1px solid transparent;padding:3px 12px;border-radius:4px;font-size:.78rem;cursor:pointer;font-family:inherit}
    .lang-btn.active{background:var(--accent-cyan);color:var(--bg-primary);font-weight:700}
    .main-nav{display:flex;justify-content:center;gap:.5rem;padding:1rem;background:var(--bg-secondary);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}

    .nav-btn.active{background:var(--accent-cyan);color:var(--bg-primary);border-color:var(--accent-cyan);font-weight:700}
    .filter-bar{background:var(--bg-secondary);padding:.8rem 1.5rem;display:flex;flex-wrap:wrap;gap:1rem;align-items:center;border-bottom:1px solid var(--border)}
    .filter-group{display:flex;align-items:center;gap:.5rem}
    .filter-group label{font-size:.8rem;color:var(--text-secondary);white-space:nowrap}
    .color-filters,.type-filters,.tier-filters{display:flex;gap:4px;flex-wrap:wrap}
    .color-btn,.type-btn,.tier-btn{background:var(--bg-card);color:var(--text-secondary);border:1px solid var(--border);padding:3px 10px;border-radius:4px;font-size:.8rem;cursor:pointer;font-family:inherit}
    .color-btn.active{background:var(--c,var(--accent-cyan));color:var(--ct,var(--bg-primary));border-color:transparent;font-weight:700}
    .type-btn.active,.tier-btn.active{background:var(--accent-cyan);color:var(--bg-primary);border-color:transparent;font-weight:700}
    .search-input{background:var(--bg-card);border:1px solid var(--border);color:var(--text-primary);padding:6px 12px;border-radius:var(--radius);font-size:.9rem;width:280px;font-family:inherit}
    #mainContent{min-height:80vh}
    .view{display:none;padding:1.5rem;max-width:1200px;margin:0 auto}.view.active{display:block}
    .loading{text-align:center;color:var(--text-secondary);padding:4rem;font-size:1.1rem}
    .site-footer{text-align:center;padding:2rem 1rem;color:var(--text-secondary);font-size:.78rem;border-top:1px solid var(--border);background:var(--bg-secondary)}
    .site-footer a{color:var(--accent-cyan);text-decoration:none}
    .modal[hidden]{display:none}

    .guides-search-box{max-width:400px;margin:.6rem auto 0}
    .guides-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
    .skel-line{background:var(--bg-card);border-radius:4px}
    .skel-card{height:280px;background:var(--bg-card);border-radius:var(--radius-lg);animation:skel-pulse 1.5s ease-in-out infinite}

    @media(max-width:600px){.filter-bar{padding:.6rem .8rem}.search-input{width:100%}.guides-grid{grid-template-columns:1fr}}

      <h2>HOLOCARD META - Fan-made ホロカ Tier List & Deck Guide Database</h2>
      <p>This fan-made site provides a comprehensive meta deck database for ホロカ / hOCG (hololive card game). Not affiliated with COVER Corp.</p>
      <h3>Features</h3>
      <ul>
        <li><strong>Tier List</strong> - Current meta deck rankings (Tier 1, Tier 2, Tier 3) based on tournament win rates and competitive performance</li>
        <li><strong>Deck Guides (100+)</strong> - Detailed deck breakdowns from holocardstrategy.jp with card analysis, mulligan tips, and turn-by-turn strategy</li>
        <li><strong>Official Recommended Decks (30)</strong> - Bushiroad's official deck recipes from en.hololive-official-cardgame.com with key card spotlights</li>
        <li><strong>Tournament Results</strong> - Winning deck lists from WGP2025-26 (Tokyo, Chiba, Aichi) with placement and deck codes</li>
        <li><strong>Card Database (1600+)</strong> - Full card search by color (white, green, red, blue, purple, yellow), type, name, and effects with all art variants</li>
      </ul>
      <h3>ホロカ環境デッキデータベース</h3>
      <p>ホロライブカードゲーム(hOCG)のファンメイド環境データベースです。最強デッキランキング、デッキ構築ガイド、大会結果、カード検索を提供しています。holocardstrategy.jpとDeck Logのデータを毎月更新。</p>
      <h3>ホロカ 牌組攻略資料庫</h3>
      <p>hololive卡牌遊戲(hOCG)粉絲製環境資料庫。提供Tier排行榜、牌組攻略、大賽結果、卡片搜尋。支援中文、英文、日文、法文。每月自動更新資料。</p>
      <h3>Popular Deck Archetypes</h3>
      <p>Hoshimachi Suisei, Tokoyami Towa, Usada Pekora, Sakura Miko, Shirakami Fubuki, Amane Kanata, Houshou Marine, Oozora Subaru, La+ Darknesss, Hakui Koyori, FUWAMOCO, Shishiro Botan, and more.</p>
      <p>Available in Chinese (繁體中文), English, Japanese (日本語), and French (Français). Data sourced from holocardstrategy.jp, Bushiroad Deck Log, and en.hololive-official-cardgame.com. Updated monthly.</p>
      <p>Please enable JavaScript to use this application.</p>
    </div>
  </noscript>
