<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hololive Card Game - Meta Deck Database</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <h1 class="site-title">
        <span class="title-holo">HOLO</span><span class="title-card">CARD</span>
        <span class="title-meta">META</span>
      </h1>
      <p class="site-subtitle">hololive OFFICIAL CARD GAME - 環境デッキデータベース</p>
    </div>
  </header>

  <nav class="main-nav">
    <button class="nav-btn active" data-view="tiers">Tier 一覽</button>
    <button class="nav-btn" data-view="cards">卡片搜尋</button>
  </nav>

  <div class="filter-bar" id="filterBar">
    <div class="filter-group">
      <label>篩選顏色</label>
      <div class="color-filters">
        <button class="color-btn active" data-color="all">ALL</button>
        <button class="color-btn" data-color="白" style="--c:#e8e8e8;--ct:#333">白</button>
        <button class="color-btn" data-color="綠" style="--c:#4caf50;--ct:#fff">綠</button>
        <button class="color-btn" data-color="紅" style="--c:#f44336;--ct:#fff">紅</button>
        <button class="color-btn" data-color="藍" style="--c:#2196f3;--ct:#fff">藍</button>
        <button class="color-btn" data-color="紫" style="--c:#9c27b0;--ct:#fff">紫</button>
        <button class="color-btn" data-color="黃" style="--c:#ffeb3b;--ct:#333">黃</button>
      </div>
    </div>
    <div class="filter-group" id="cardSearchGroup" style="display:none">
      <label>搜尋卡片</label>
      <input type="text" id="cardSearch" placeholder="輸入卡片名稱、標籤、效果..." class="search-input">
    </div>
    <div class="filter-group" id="cardTypeGroup" style="display:none">
      <label>卡片類型</label>
      <div class="type-filters">
        <button class="type-btn active" data-type="all">ALL</button>
        <button class="type-btn" data-type="主推">主推</button>
        <button class="type-btn" data-type="成員">成員</button>
        <button class="type-btn" data-type="support">支援</button>
        <button class="type-btn" data-type="吶喊">吶喊</button>
      </div>
    </div>
  </div>

  <main id="mainContent">
    <div id="tiersView" class="view active">
      <div class="loading">載入中...</div>
    </div>
    <div id="cardsView" class="view">
      <div class="loading">載入中...</div>
    </div>
  </main>

  <div id="deckModal" class="modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <button class="modal-close">&times;</button>
      <div id="deckModalBody"></div>
    </div>
  </div>

  <div id="cardModal" class="modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-content card-modal-content">
      <button class="modal-close">&times;</button>
      <div id="cardModalBody"></div>
    </div>
  </div>

  <footer class="site-footer">
    <p>Fan-made meta database. All card data &copy; 2016 COVER Corp. / hololive OFFICIAL CARD GAME</p>
    <p>Data sources: <a href="https://hololive-cardgame.github.io/cards/" target="_blank">hololive卡牌資料庫</a> | <a href="https://www.holocardstrategy.jp/" target="_blank">ホロカ攻略ギルド</a></p>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
