      <h2>HOLOCARD META - hOCG Tier List & Deck Guide Database</h2>
      <p>The most comprehensive fan-made meta deck database for hololive OFFICIAL CARD GAME (hOCG / ホロカ). Browse competitive tier rankings, deck recipes, tournament results, and a full card database — updated monthly. Not affiliated with COVER Corp.</p>

      <h3>hololive Card Game Tier List & Meta Rankings</h3>
      <p>Our tier list ranks every competitive hOCG deck into Tier 1, Tier 2, and Tier 3 based on WGP tournament win rates, usage rates, and overall meta performance. Find out which Oshi decks dominate the current competitive scene.</p>

      <h3>Deck Guides & Recipes (100+)</h3>
      <ul>
        <li><strong>Strategy Guides</strong> — 100+ detailed deck guides from holocardstrategy.jp with card breakdowns, mulligan advice, and turn-by-turn play patterns</li>
        <li><strong>Official Recommended Decks (30+)</strong> — Bushiroad's official deck recipes from en.hololive-official-cardgame.com with key card spotlights</li>
        <li><strong>Deck Building Tips</strong> — Learn how to build competitive decks by color (White, Green, Red, Blue, Purple, Yellow) with recommended card ratios</li>
      </ul>

      <h3>WGP Tournament Results</h3>
      <p>Complete tournament results from WGP2025-26 season including Tokyo, Chiba, Aichi, and more. View winning deck lists, Oshi usage rates, deck codes for Bushiroad Deck Log, and placement details for every event.</p>

      <h3>Card Database (1600+ Cards)</h3>
      <p>Search all hOCG cards by name, color, type (Oshi, Member, Support, Cheer), effect text, and product set. View every art variant and card detail including HP, damage, Bloom level, and special abilities.</p>

      <h3>Popular Oshi Deck Archetypes</h3>
      <p>Hoshimachi Suisei (星街すいせい), Tokoyami Towa (常闇トワ), Usada Pekora (兎田ぺこら), Sakura Miko (さくらみこ), Shirakami Fubuki (白上フブキ), Amane Kanata (天音かなた), Houshou Marine (宝鐘マリン), Oozora Subaru (大空スバル), La+ Darknesss (ラプラス・ダークネス), Hakui Koyori (博衣こより), FUWAMOCO (フワモコ), Shishiro Botan (獅白ぼたん), Himemori Luna (姫森ルーナ), Momosuzu Nene (桃鈴ねね), AZKi, and more.</p>

      <h3>ホロカ環境デッキデータベース — 最強デッキランキング</h3>
      <p>ホロライブカードゲーム (hOCG / ホロカ) のファンメイド環境データベースです。WGP大会入賞率を基にしたTierランキング、100以上のデッキ攻略記事、デッキレシピ、カード検索を提供しています。</p>

      <h4>デッキ攻略ガイド (100件以上)</h4>
      <p>holocardstrategy.jpの全攻略記事を収録。採用カード解説、マリガン判断、回し方（ターン別戦略）を含む詳細ガイド。色別（白・緑・赤・青・紫・黄）やTier別で絞り込み可能。初心者から上級者まで、デッキ構築の参考にどうぞ。</p>

      <h4>WGP大会結果・入賞デッキ</h4>
      <p>WGP2025-26シーズン（東京・千葉・愛知など）の入賞デッキ一覧。推し使用率、デッキコード（Deck Log対応）、順位を確認できます。環境の変化を追いたい方に。</p>
