<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOLOCARD META - hololive Card Game Deck Database & Tier List</title>
  <meta name="description" content="Fan-made meta deck database for hololive OFFICIAL CARD GAME. Browse tier lists, deck guides, tournament results, and card data. Updated monthly.">
  <meta name="keywords" content="hololive, card game, ホロカ, tier list, deck guide, tournament, meta, ホロライブ, カードゲーム, 環境, デッキ">
  <link rel="canonical" href="https://holocardgame-meta.github.io/">

  <meta property="og:type" content="website">
  <meta property="og:title" content="HOLOCARD META - hololive Card Game Deck Database">
  <meta property="og:description" content="Tier lists, deck guides, tournament results & card search for hololive OFFICIAL CARD GAME.">
  <meta property="og:url" content="https://holocardgame-meta.github.io/">
  <meta property="og:site_name" content="HOLOCARD META">
  <meta property="og:locale" content="zh_TW">
  <meta property="og:locale:alternate" content="ja_JP">
  <meta property="og:locale:alternate" content="en_US">

  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="HOLOCARD META - hololive Card Game Deck Database">
  <meta name="twitter:description" content="Tier lists, deck guides, tournament results & card search for hololive OFFICIAL CARD GAME.">

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "HOLOCARD META",
    "alternateName": "ホロカメタ",
    "url": "https://holocardgame-meta.github.io/",
    "description": "Fan-made meta deck database for hololive OFFICIAL CARD GAME",
    "inLanguage": ["zh-TW", "ja", "en", "fr"]
  }
  </script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <h1 class="site-title">
        <span class="title-holo">HOLO</span><span class="title-card">CARD</span>
        <span class="title-meta">META</span>
      </h1>
      <p class="site-subtitle" data-i18n="subtitle">hololive OFFICIAL CARD GAME - 環境牌組資料庫</p>
      <div class="lang-switcher" id="langSwitcher"></div>
    </div>
  </header>

  <nav class="main-nav">
    <button class="nav-btn active" data-view="guides" data-i18n="nav_guides">牌組攻略</button>
    <button class="nav-btn" data-view="tournament" data-i18n="nav_tournament">大賽牌組</button>
    <button class="nav-btn" data-view="cards" data-i18n="nav_cards">卡片搜尋</button>
  </nav>

  <div class="filter-bar" id="filterBar">
    <div class="filter-group">
      <label data-i18n="filter_color">篩選顏色</label>
      <div class="color-filters">
        <button class="color-btn active" data-color="all">ALL</button>
        <button class="color-btn" data-color="白" data-i18n="color_white" style="--c:#e8e8e8;--ct:#333">白</button>
        <button class="color-btn" data-color="綠" data-i18n="color_green" style="--c:#4caf50;--ct:#fff">綠</button>
        <button class="color-btn" data-color="紅" data-i18n="color_red" style="--c:#f44336;--ct:#fff">紅</button>
        <button class="color-btn" data-color="藍" data-i18n="color_blue" style="--c:#2196f3;--ct:#fff">藍</button>
        <button class="color-btn" data-color="紫" data-i18n="color_purple" style="--c:#9c27b0;--ct:#fff">紫</button>
        <button class="color-btn" data-color="黃" data-i18n="color_yellow" style="--c:#ffeb3b;--ct:#333">黃</button>
      </div>
    </div>
    <div class="filter-group" id="tierFilterGroup">
      <label data-i18n="filter_tier">篩選 Tier</label>
      <div class="tier-filters">
        <button class="tier-btn active" data-tier="all">ALL</button>
        <button class="tier-btn" data-tier="1">Tier 1</button>
        <button class="tier-btn" data-tier="2">Tier 2</button>
        <button class="tier-btn" data-tier="3">Tier 3</button>
        <button class="tier-btn" data-tier="guide" data-i18n="guides_filter_guide">其他攻略</button>
      </div>
    </div>
    <div class="filter-group" id="cardSearchGroup" style="display:none">
      <label data-i18n="filter_search">搜尋卡片</label>
      <input type="text" id="cardSearch" data-i18n-placeholder="filter_search_placeholder" placeholder="輸入卡片名稱、標籤、效果..." class="search-input">
    </div>
    <div class="filter-group" id="cardTypeGroup" style="display:none">
      <label data-i18n="filter_type">卡片類型</label>
      <div class="type-filters">
        <button class="type-btn active" data-type="all">ALL</button>
        <button class="type-btn" data-type="主推" data-i18n="type_oshi">主推</button>
        <button class="type-btn" data-type="成員" data-i18n="type_member">成員</button>
        <button class="type-btn" data-type="support" data-i18n="type_support">支援</button>
        <button class="type-btn" data-type="吶喊" data-i18n="type_cheer">吶喊</button>
      </div>
    </div>
  </div>

  <noscript>
    <div style="max-width:700px;margin:2rem auto;padding:1rem;color:#ccc">
      <h2>HOLOCARD META - hololive Card Game Deck Database</h2>
      <p>This site provides a comprehensive meta deck database for hololive OFFICIAL CARD GAME (ホロライブカードゲーム), including:</p>
      <ul>
        <li>Tier list rankings (Tier 1, 2, 3) with deck ratings and features</li>
        <li>100+ deck guides with card breakdowns and turn-by-turn strategy</li>
        <li>Tournament results from WGP Tokyo, Chiba, Aichi and more</li>
        <li>Full card database with search by color, type, and effects</li>
      </ul>
      <p>Available in Chinese, English, Japanese, and French. Data sourced from holocardstrategy.jp and Bushiroad Deck Log.</p>
      <p>Please enable JavaScript to use this application.</p>
    </div>
  </noscript>

  <main id="mainContent">
    <div id="guidesView" class="view active">
      <div class="loading" data-i18n="loading">載入中...</div>
    </div>
    <div id="tournamentView" class="view">
      <div class="loading" data-i18n="loading">載入中...</div>
    </div>
    <div id="cardsView" class="view">
      <div class="loading" data-i18n="loading">載入中...</div>
    </div>
  </main>

  <div id="deckModal" class="modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <button class="modal-close">&times;</button>
      <div id="deckModalBody"></div>
    </div>
  </div>

  <div id="cardModal" class="modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-content card-modal-content">
      <button class="modal-close">&times;</button>
      <div id="cardModalBody"></div>
    </div>
  </div>

  <footer class="site-footer">
    <p data-i18n="footer_disclaimer">Fan-made 環境資料庫。卡片資料 © 2016 COVER Corp. / hololive OFFICIAL CARD GAME</p>
    <p><span data-i18n="footer_sources">資料來源</span>: <a href="https://hololive-cardgame.github.io/cards/" target="_blank" data-i18n="footer_card_db">hololive卡牌資料庫</a> | <a href="https://www.holocardstrategy.jp/" target="_blank" data-i18n="footer_strategy">ホロカ攻略ギルド</a> | <a href="https://decklog-en.bushiroad.com/" target="_blank">Deck Log</a></p>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
