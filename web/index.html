      <h2>HOLOCARD META - Fan-made ホロカ Tier List & Deck Guide Database</h2>
      <p>This fan-made site provides a comprehensive meta deck database for ホロカ / hOCG (hololive card game). Not affiliated with COVER Corp.</p>
      <h3>Features</h3>
      <ul>
        <li><strong>Tier List</strong> - Current meta deck rankings (Tier 1, Tier 2, Tier 3) based on tournament win rates and competitive performance</li>
        <li><strong>Deck Guides (100+)</strong> - Detailed deck breakdowns from holocardstrategy.jp with card analysis, mulligan tips, and turn-by-turn strategy</li>
        <li><strong>Official Recommended Decks (30)</strong> - Bushiroad's official deck recipes from en.hololive-official-cardgame.com with key card spotlights</li>
        <li><strong>Tournament Results</strong> - Winning deck lists from WGP2025-26 (Tokyo, Chiba, Aichi) with placement and deck codes</li>
        <li><strong>Card Database (1600+)</strong> - Full card search by color (white, green, red, blue, purple, yellow), type, name, and effects with all art variants</li>
      </ul>
      <h3>ホロカ環境デッキデータベース</h3>
      <p>ホロライブカードゲーム(hOCG)のファンメイド環境データベースです。最強デッキランキング、デッキ構築ガイド、大会結果、カード検索を提供しています。holocardstrategy.jpとDeck Logのデータを毎月更新。</p>
      <h3>ホロカ 牌組攻略資料庫</h3>
      <p>hololive卡牌遊戲(hOCG)粉絲製環境資料庫。提供Tier排行榜、牌組攻略、大賽結果、卡片搜尋。支援中文、英文、日文、法文。每月自動更新資料。</p>
      <h3>Popular Deck Archetypes</h3>
      <p>Hoshimachi Suisei, Tokoyami Towa, Usada Pekora, Sakura Miko, Shirakami Fubuki, Amane Kanata, Houshou Marine, Oozora Subaru, La+ Darknesss, Hakui Koyori, FUWAMOCO, Shishiro Botan, and more.</p>
      <p>Available in Chinese (繁體中文), English, Japanese (日本語), and French (Français). Data sourced from holocardstrategy.jp, Bushiroad Deck Log, and en.hololive-official-cardgame.com. Updated monthly.</p>
      <p>Please enable JavaScript to use this application.</p>
